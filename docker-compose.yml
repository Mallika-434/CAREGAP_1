version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: caregap_postgres
    environment:
      POSTGRES_USER: caregap_user
      POSTGRES_PASSWORD: caregap_password
      POSTGRES_DB: caregap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: caregap_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
